<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>价保助手</title>
  <style>
    :root {
      --accent: #E03B3B;
      --accent-soft: rgba(224, 59, 59, 0.08);
      --jd-color: #E03B3B;
      --tb-color: #FF6A00;

      --chrome-bg: #ECECEE;
      --chrome-text: rgba(0, 0, 0, 0.65);

      --bg: #F5F5F7;
      --surface: #FFFFFF;
      --surface-2: #F9F9FB;
      --surface-inset: #F0F0F2;

      --text: #1D1D1F;
      --text-muted: rgba(29, 29, 31, 0.56);
      --text-subtle: rgba(29, 29, 31, 0.38);

      --line: rgba(0, 0, 0, 0.06);
      --line-strong: rgba(0, 0, 0, 0.1);

      --success: #2FA85C;
      --danger: #E0433B;
      --warning: #DB8A15;

      --log-bg: #1C1C1E;
      --log-text: #B5B5BA;
      --log-muted: rgba(181, 181, 186, 0.55);
      --log-success: #9BE39B;
      --log-accent: #FFB45E;
      --log-danger: #FF9690;
      --log-jd: #FF8E8E;
      --log-tb: #FFB87A;

      --font-system: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Helvetica Neue", sans-serif;
      --font-display: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Helvetica Neue", sans-serif;
      --font-mono: "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: var(--font-system);
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      display: flex;
      flex-direction: column;
      user-select: none;
      overflow: hidden;
    }
    .jd-num { font-variant-numeric: tabular-nums; }
    button { font-family: inherit; }

    @keyframes jd-pulse {
      0% { transform: scale(1); opacity: .4; }
      100% { transform: scale(2.4); opacity: 0; }
    }
    @keyframes jd-breathe {
      0%, 100% { opacity: .5; }
      50% { opacity: 1; }
    }
    @keyframes jd-sweep {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(300%); }
    }

    /* ── Title bar ── */
    .titlebar {
      height: 44px;
      background: var(--chrome-bg);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 500;
      color: var(--chrome-text);
      flex-shrink: 0;
      -webkit-app-region: drag;
    }
    .titlebar button, .titlebar select { -webkit-app-region: no-drag; }

    /* ── Update bar ── */
    .update-bar {
      display: none;
      background: #0A84FF;
      color: #fff;
      padding: 8px 24px;
      font-size: 13px;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .update-bar.show { display: flex; }
    .update-bar .update-text { flex: 1; }
    .update-bar .btn-update {
      padding: 4px 12px;
      border: 1px solid rgba(255,255,255,0.6);
      border-radius: 6px;
      background: transparent;
      color: #fff;
      font-size: 12px;
      cursor: pointer;
    }
    .update-bar .btn-update:hover { background: rgba(255,255,255,0.15); }

    /* Status dot */
    .dot { position: relative; width: 8px; height: 8px; display: inline-block; flex-shrink: 0; }
    .dot .inner { position: absolute; inset: 0; border-radius: 50%; background: var(--text-subtle); }
    .dot .pulse {
      display: none;
      position: absolute; inset: -3px;
      border-radius: 50%; opacity: .25;
      animation: jd-pulse 1.6s ease-out infinite;
    }
    .dot.pulsing .pulse { display: block; }
    .dot.success .inner, .dot.success .pulse { background: var(--success); }
    .dot.danger  .inner, .dot.danger  .pulse { background: var(--danger); }
    .dot.warning .inner, .dot.warning .pulse { background: var(--warning); }
    .dot.accent  .inner, .dot.accent  .pulse { background: var(--accent); }
    .dot.muted   .inner, .dot.muted   .pulse { background: var(--text-subtle); }

    /* ── Hero: total savings ── */
    .hero-wrap { padding: 22px 32px 16px; flex-shrink: 0; }
    .hero {
      position: relative;
      background: var(--surface);
      border-radius: 16px;
      padding: 24px 28px 22px;
      border: 1px solid var(--line);
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 240px; height: 240px;
      background: radial-gradient(circle, var(--accent-soft) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-label {
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.3px;
      text-transform: uppercase;
      margin-bottom: 8px;
      position: relative;
    }
    .hero-amount {
      font-family: var(--font-display);
      font-size: 52px;
      font-weight: 300;
      letter-spacing: -1.5px;
      line-height: 1;
      color: var(--accent);
      display: flex;
      align-items: baseline;
      gap: 4px;
      position: relative;
    }
    .hero-amount .sym { font-size: 30px; font-weight: 400; opacity: 0.8; }
    .hero-amount .dec { font-size: 26px; font-weight: 300; opacity: 0.55; }
    .hero-meta {
      margin-top: 10px;
      font-size: 13px;
      color: var(--text-muted);
      position: relative;
    }
    .hero-meta strong { color: var(--text); font-weight: 500; }

    /* ── Platform cards ── */
    .platform-wrap { padding: 8px 32px 0; display: flex; flex-direction: column; gap: 12px; flex-shrink: 0; }
    .platform {
      background: var(--surface);
      border-radius: 14px;
      border: 1px solid var(--line);
      padding: 16px 18px;
    }
    .platform-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .platform-name {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.1px;
    }
    .platform-name.jd { color: var(--jd-color); }
    .platform-name.tb { color: var(--tb-color); }
    .login-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 10px;
      border-radius: 999px;
      background: var(--surface-2);
      border: 1px solid var(--line);
      font-size: 12px;
      color: var(--text-muted);
      margin-left: auto;
    }
    .login-pill.logged-in {
      background: rgba(47, 168, 92, 0.08);
      border-color: rgba(47, 168, 92, 0.2);
      color: var(--success);
    }
    .login-pill .pill-dot {
      display: none;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--success);
      flex-shrink: 0;
    }
    .login-pill.logged-in .pill-dot { display: block; }
    .login-pill .action {
      color: var(--text-subtle);
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      font-size: inherit;
      font-family: inherit;
      margin-left: 2px;
    }
    .login-pill .action::before {
      content: '·';
      margin-right: 4px;
      color: inherit;
      opacity: 0.5;
    }
    .login-pill .action:hover { color: var(--text); }
    .login-pill .action.primary { color: var(--accent); }

    .platform-stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
      margin-bottom: 14px;
    }
    .stat-label { font-size: 11px; color: var(--text-muted); margin-bottom: 3px; }
    .stat-value {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: -0.1px;
      color: var(--text);
    }
    .stat-value.pending { color: var(--text-muted); font-weight: 400; }
    .stat-value.success { color: var(--success); }
    .stat-value.danger { color: var(--danger); }
    .stat-meta { font-size: 11px; color: var(--text-subtle); margin-top: 2px; }

    .platform-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .interval {
      flex: 1;
      background: var(--surface-2);
      border-radius: 10px;
      border: 1px solid var(--line);
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12.5px;
      color: var(--text-muted);
    }
    .interval select {
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 12.5px;
      font-family: inherit;
      cursor: pointer;
      outline: none;
      margin-left: auto;
      text-align: right;
    }
    .btn-run {
      padding: 0 18px;
      height: 34px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 12.5px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: opacity 0.15s, transform 0.05s;
      flex-shrink: 0;
    }
    .btn-run:hover:not(:disabled) { opacity: 0.9; }
    .btn-run:active:not(:disabled) { transform: scale(0.98); }
    .btn-run:disabled {
      background: var(--surface);
      color: var(--text-subtle);
      border: 1px solid var(--line-strong);
      cursor: not-allowed;
    }
    .btn-run.loading {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--line-strong);
    }

    .progress-strip {
      display: none;
      margin-top: 10px;
      height: 3px;
      background: var(--surface-inset);
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }
    .progress-strip.show { display: block; }
    .progress-strip::after {
      content: '';
      position: absolute;
      top: 0; left: 0; bottom: 0;
      width: 33%;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      animation: jd-sweep 1.8s linear infinite;
    }

    /* ── Log ── */
    .log-wrap {
      padding: 16px 32px 12px;
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    .log-head {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
      gap: 10px;
    }
    .section-label {
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.3px;
      text-transform: uppercase;
      flex: 1;
    }
    .log-head .count { font-size: 12px; color: var(--text-subtle); }
    .log-box {
      flex: 1;
      background: var(--log-bg);
      border-radius: 12px;
      padding: 12px 16px;
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 1.65;
      color: var(--log-text);
      overflow-y: auto;
      user-select: text;
    }
    .log-box::-webkit-scrollbar { width: 8px; }
    .log-box::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
    }
    .log-line {
      color: var(--log-muted);
      white-space: pre-wrap;
      word-break: break-all;
    }
    .log-line .ts { color: rgba(181,181,186,.35); }
    .log-line .tag-jd { color: var(--log-jd); }
    .log-line .tag-tb { color: var(--log-tb); }
    .log-line.success { color: var(--log-success); }
    .log-line.accent  { color: var(--log-accent); }
    .log-line.danger  { color: var(--log-danger); }
    .log-cursor {
      color: var(--log-muted);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .log-cursor .arrow { opacity: 0.5; }
    .log-cursor .blink {
      opacity: 0.6;
      animation: jd-breathe 1.4s ease-in-out infinite;
    }

    /* ── Footer ── */
    .footer {
      padding: 8px 32px 12px;
      font-size: 11px;
      color: var(--text-subtle);
      text-align: center;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="titlebar">价保助手</div>

  <div class="update-bar" id="updateBar">
    <span class="update-text" id="updateText"></span>
    <button class="btn-update" id="updateBtn">下载更新</button>
  </div>

  <!-- Hero: total savings -->
  <div class="hero-wrap">
    <div class="hero">
      <div class="hero-label">累计省钱</div>
      <div class="hero-amount jd-num">
        <span class="sym">¥</span><span id="heroInt">0</span><span class="dec" id="heroDec">.00</span>
      </div>
      <div class="hero-meta">
        <strong class="jd-num" id="heroCount">0</strong> 件商品成功退款
      </div>
    </div>
  </div>

  <!-- Platforms -->
  <div class="platform-wrap">
    <!-- JD -->
    <div class="platform" id="card-jd">
      <div class="platform-head">
        <span class="dot muted" id="jd-dot"><span class="pulse"></span><span class="inner"></span></span>
        <span class="platform-name jd">京东</span>
        <span class="login-pill" id="jd-loginPill">
          <span class="pill-dot"></span>
          <span id="jd-loginText">检测中…</span>
          <button class="action" id="jd-loginAction" style="display:none"></button>
        </span>
      </div>
      <div class="platform-stats">
        <div>
          <div class="stat-label">累计</div>
          <div class="stat-value jd-num" id="jd-saved">¥0.00</div>
          <div class="stat-meta jd-num" id="jd-savedMeta">0 件</div>
        </div>
        <div>
          <div class="stat-label">上次运行</div>
          <div class="stat-value pending" id="jd-lastRun">--</div>
          <div class="stat-meta" id="jd-lastResult"></div>
        </div>
        <div>
          <div class="stat-label">下次运行</div>
          <div class="stat-value pending" id="jd-nextRun">--</div>
          <div class="stat-meta" id="jd-nextRunMeta"></div>
        </div>
      </div>
      <div class="platform-actions">
        <div class="interval">
          <span>每</span>
          <select id="jd-intervalSelect">
            <option value="0.5">30 分钟</option>
            <option value="1">1 小时</option>
            <option value="2" selected>2 小时</option>
            <option value="4">4 小时</option>
            <option value="6">6 小时</option>
            <option value="8">8 小时</option>
            <option value="12">12 小时</option>
            <option value="24">24 小时</option>
          </select>
          <span>执行一次</span>
        </div>
        <button class="btn-run" id="jd-runBtn">
          <span id="jd-runBtnText">立即执行</span>
        </button>
      </div>
      <div class="progress-strip" id="jd-progress"></div>
    </div>

    <!-- TB -->
    <div class="platform" id="card-tb">
      <div class="platform-head">
        <span class="dot muted" id="tb-dot"><span class="pulse"></span><span class="inner"></span></span>
        <span class="platform-name tb">淘宝</span>
        <span class="login-pill" id="tb-loginPill">
          <span class="pill-dot"></span>
          <span id="tb-loginText">检测中…</span>
          <button class="action" id="tb-loginAction" style="display:none"></button>
        </span>
      </div>
      <div class="platform-stats">
        <div>
          <div class="stat-label">累计</div>
          <div class="stat-value jd-num" id="tb-saved">¥0.00</div>
          <div class="stat-meta jd-num" id="tb-savedMeta">0 件</div>
        </div>
        <div>
          <div class="stat-label">上次运行</div>
          <div class="stat-value pending" id="tb-lastRun">--</div>
          <div class="stat-meta" id="tb-lastResult"></div>
        </div>
        <div>
          <div class="stat-label">下次运行</div>
          <div class="stat-value pending" id="tb-nextRun">--</div>
          <div class="stat-meta" id="tb-nextRunMeta"></div>
        </div>
      </div>
      <div class="platform-actions">
        <div class="interval">
          <span>每</span>
          <select id="tb-intervalSelect">
            <option value="0.5">30 分钟</option>
            <option value="1">1 小时</option>
            <option value="2" selected>2 小时</option>
            <option value="4">4 小时</option>
            <option value="6">6 小时</option>
            <option value="8">8 小时</option>
            <option value="12">12 小时</option>
            <option value="24">24 小时</option>
          </select>
          <span>执行一次</span>
        </div>
        <button class="btn-run" id="tb-runBtn">
          <span id="tb-runBtnText">立即执行</span>
        </button>
      </div>
      <div class="progress-strip" id="tb-progress"></div>
    </div>
  </div>

  <!-- Log -->
  <div class="log-wrap">
    <div class="log-head">
      <div class="section-label">运行日志</div>
      <div class="count">最近 200 条</div>
    </div>
    <div class="log-box" id="logBox">
      <div class="log-cursor"><span class="arrow">▸</span><span class="blink">_</span></div>
    </div>
  </div>

  <div class="footer">关闭窗口后将在菜单栏继续运行 · <span id="appVersion"></span></div>

  <script src="renderer.js"></script>
</body>
</html>
