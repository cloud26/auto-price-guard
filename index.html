<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>价保助手</title>
  <style>
    :root {
      --accent: #E03B3B;
      --accent-soft: rgba(224, 59, 59, 0.08);

      --chrome-bg: #ECECEE;
      --chrome-text: rgba(0, 0, 0, 0.65);

      --bg: #F5F5F7;
      --surface: #FFFFFF;
      --surface-2: #F9F9FB;
      --surface-inset: #F0F0F2;

      --text: #1D1D1F;
      --text-muted: rgba(29, 29, 31, 0.56);
      --text-subtle: rgba(29, 29, 31, 0.38);

      --line: rgba(0, 0, 0, 0.06);
      --line-strong: rgba(0, 0, 0, 0.1);

      --success: #2FA85C;
      --danger: #E0433B;
      --warning: #DB8A15;

      --log-bg: #1C1C1E;
      --log-text: #B5B5BA;
      --log-muted: rgba(181, 181, 186, 0.55);
      --log-success: #9BE39B;
      --log-accent: #FFB45E;
      --log-danger: #FF9690;

      --font-system: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Helvetica Neue", sans-serif;
      --font-display: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Helvetica Neue", sans-serif;
      --font-mono: "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
    }

    body {
      font-family: var(--font-system);
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      display: flex;
      flex-direction: column;
      user-select: none;
      overflow: hidden;
    }

    .jd-num { font-variant-numeric: tabular-nums; }

    button {
      font-family: inherit;
    }

    @keyframes jd-pulse {
      0% { transform: scale(1); opacity: .4; }
      100% { transform: scale(2.4); opacity: 0; }
    }
    @keyframes jd-breathe {
      0%, 100% { opacity: .5; }
      50% { opacity: 1; }
    }
    @keyframes jd-sweep {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(300%); }
    }

    /* ── Title bar (macOS hiddenInset) ── */
    .titlebar {
      height: 44px;
      background: var(--chrome-bg);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 500;
      color: var(--chrome-text);
      flex-shrink: 0;
      -webkit-app-region: drag;
    }
    .titlebar button, .titlebar select { -webkit-app-region: no-drag; }

    /* ── Update bar ── */
    .update-bar {
      display: none;
      background: #0A84FF;
      color: #fff;
      padding: 8px 24px;
      font-size: 13px;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .update-bar.show { display: flex; }
    .update-bar .update-text { flex: 1; }
    .update-bar .btn-update {
      padding: 4px 12px;
      border: 1px solid rgba(255,255,255,0.6);
      border-radius: 6px;
      background: transparent;
      color: #fff;
      font-size: 12px;
      cursor: pointer;
    }
    .update-bar .btn-update:hover { background: rgba(255,255,255,0.15); }

    /* ── Greeting row ── */
    .greeting {
      padding: 24px 32px 18px;
      display: flex;
      align-items: flex-start;
      gap: 16px;
      flex-shrink: 0;
    }
    .greeting-text { flex: 1; }
    .greeting-hello {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .greeting-title {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .login-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      background: var(--surface-2);
      border: 1px solid var(--line);
      font-size: 12.5px;
      color: var(--text-muted);
    }
    .login-pill .sep {
      color: var(--text-subtle);
      margin: 0 2px;
    }
    .login-pill .action {
      color: var(--text-subtle);
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      font-size: inherit;
      font-family: inherit;
    }
    .login-pill .action:hover { color: var(--text); }
    .login-pill .action.primary { color: var(--accent); }

    /* Status dot */
    .dot {
      position: relative;
      width: 8px;
      height: 8px;
      display: inline-block;
      flex-shrink: 0;
    }
    .dot .inner {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: var(--text-subtle);
    }
    .dot .pulse {
      display: none;
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      opacity: .25;
      animation: jd-pulse 1.6s ease-out infinite;
    }
    .dot.pulsing .pulse { display: block; }
    .dot.success .inner, .dot.success .pulse { background: var(--success); }
    .dot.danger  .inner, .dot.danger  .pulse { background: var(--danger); }
    .dot.warning .inner, .dot.warning .pulse { background: var(--warning); }
    .dot.accent  .inner, .dot.accent  .pulse { background: var(--accent); }
    .dot.muted   .inner, .dot.muted   .pulse { background: var(--text-subtle); }

    /* ── Hero savings card ── */
    .hero-wrap { padding: 0 32px; flex-shrink: 0; }
    .hero {
      position: relative;
      background: var(--surface);
      border-radius: 16px;
      padding: 28px 28px 24px;
      border: 1px solid var(--line);
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 240px; height: 240px;
      background: radial-gradient(circle, var(--accent-soft) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-label {
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.3px;
      text-transform: uppercase;
      margin-bottom: 10px;
      position: relative;
    }
    .hero-amount {
      font-family: var(--font-display);
      font-size: 64px;
      font-weight: 300;
      letter-spacing: -2px;
      line-height: 1;
      color: var(--accent);
      display: flex;
      align-items: baseline;
      gap: 4px;
      position: relative;
    }
    .hero-amount .sym {
      font-size: 36px;
      font-weight: 400;
      opacity: 0.8;
    }
    .hero-amount .dec {
      font-size: 32px;
      font-weight: 300;
      opacity: 0.55;
    }
    .hero-meta {
      margin-top: 14px;
      display: flex;
      gap: 28px;
      font-size: 13px;
      color: var(--text-muted);
      position: relative;
    }
    .hero-meta strong {
      color: var(--text);
      font-weight: 500;
    }

    /* ── Run state card ── */
    .run-wrap { padding: 16px 32px 0; flex-shrink: 0; }
    .run {
      background: var(--surface);
      border-radius: 16px;
      border: 1px solid var(--line);
      padding: 20px;
    }
    .run-head {
      display: flex;
      align-items: center;
      margin-bottom: 16px;
    }
    .section-label {
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.3px;
      text-transform: uppercase;
      flex: 1;
    }
    .run-state {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .run-state.active { color: var(--accent); }
    .run-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 20px;
    }
    .stat-label {
      font-size: 11.5px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .stat-value {
      font-size: 16px;
      font-weight: 500;
      letter-spacing: -0.2px;
      color: var(--text);
    }
    .stat-value.success { color: var(--success); }
    .stat-value.danger  { color: var(--danger); }
    .stat-value.pending { color: var(--text-muted); font-weight: 400; }
    .stat-meta {
      font-size: 11.5px;
      color: var(--text-subtle);
      margin-top: 2px;
    }

    .progress-strip {
      display: none;
      margin-top: 16px;
      height: 3px;
      background: var(--surface-inset);
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }
    .progress-strip.show { display: block; }
    .progress-strip::after {
      content: '';
      position: absolute;
      top: 0; left: 0; bottom: 0;
      width: 33%;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      animation: jd-sweep 1.8s linear infinite;
    }

    /* ── Interval + run button ── */
    .actions-wrap {
      padding: 16px 32px 0;
      display: flex;
      gap: 12px;
      flex-shrink: 0;
    }
    .interval {
      flex: 1;
      background: var(--surface);
      border-radius: 14px;
      border: 1px solid var(--line);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .interval-label {
      font-size: 13.5px;
      color: var(--text);
      flex: 1;
    }
    .interval select {
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 13.5px;
      font-family: inherit;
      cursor: pointer;
      outline: none;
      text-align: right;
      padding-right: 4px;
    }
    .btn-run {
      padding: 0 24px;
      height: 46px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 13.5px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: opacity 0.15s, transform 0.05s;
    }
    .btn-run:hover:not(:disabled) { opacity: 0.9; }
    .btn-run:active:not(:disabled) { transform: scale(0.98); }
    .btn-run:disabled {
      background: var(--surface);
      color: var(--text-subtle);
      border: 1px solid var(--line-strong);
      cursor: not-allowed;
    }
    .btn-run.loading {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--line-strong);
    }
    .btn-run .stop-dot {
      width: 8px;
      height: 8px;
      border-radius: 2px;
      background: currentColor;
    }

    /* ── Log ── */
    .log-wrap {
      padding: 16px 32px 20px;
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    .log-head {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
      gap: 10px;
    }
    .log-head .count {
      font-size: 12px;
      color: var(--text-subtle);
    }
    .log-box {
      flex: 1;
      background: var(--log-bg);
      border-radius: 12px;
      padding: 14px 16px;
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 1.7;
      color: var(--log-text);
      overflow-y: auto;
      user-select: text;
    }
    .log-box::-webkit-scrollbar { width: 8px; }
    .log-box::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
    }
    .log-line {
      color: var(--log-muted);
      white-space: pre-wrap;
      word-break: break-all;
    }
    .log-line .ts { color: rgba(181,181,186,.35); }
    .log-line.success { color: var(--log-success); }
    .log-line.accent  { color: var(--log-accent); }
    .log-line.danger  { color: var(--log-danger); }
    .log-cursor {
      color: var(--log-muted);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .log-cursor .arrow { opacity: 0.5; }
    .log-cursor .blink {
      opacity: 0.6;
      animation: jd-breathe 1.4s ease-in-out infinite;
    }

    /* ── Footer ── */
    .footer {
      padding: 8px 32px 12px;
      font-size: 11px;
      color: var(--text-subtle);
      text-align: center;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="titlebar">价保助手</div>

  <div class="update-bar" id="updateBar">
    <span class="update-text" id="updateText"></span>
    <button class="btn-update" id="updateBtn">下载更新</button>
  </div>

  <!-- Greeting + login pill -->
  <div class="greeting">
    <div class="greeting-text">
      <div class="greeting-hello" id="greetingHello">你好</div>
      <div class="greeting-title">价保助手</div>
    </div>
    <div class="login-pill" id="loginPill">
      <span class="dot muted" id="loginDot"><span class="pulse"></span><span class="inner"></span></span>
      <span id="loginText">检测登录状态...</span>
      <span class="sep" id="loginSep" style="display:none">·</span>
      <button class="action" id="loginAction" style="display:none">登录</button>
    </div>
  </div>

  <!-- Hero savings -->
  <div class="hero-wrap">
    <div class="hero">
      <div class="hero-label">累计省钱</div>
      <div class="hero-amount jd-num">
        <span class="sym">¥</span><span id="heroInt">0</span><span class="dec" id="heroDec">.00</span>
      </div>
      <div class="hero-meta">
        <div><strong class="jd-num" id="heroCount">0</strong> 件商品成功退款</div>
      </div>
    </div>
  </div>

  <!-- Run state -->
  <div class="run-wrap">
    <div class="run">
      <div class="run-head">
        <div class="section-label">运行状态</div>
        <div class="run-state" id="runState">
          <span class="dot muted" id="runStateDot"><span class="pulse"></span><span class="inner"></span></span>
          <span id="runStateText">未启动</span>
        </div>
      </div>
      <div class="run-grid">
        <div>
          <div class="stat-label">上次运行</div>
          <div class="stat-value pending jd-num" id="lastRun">--</div>
          <div class="stat-meta" id="lastRunMeta"></div>
        </div>
        <div>
          <div class="stat-label">本次结果</div>
          <div class="stat-value pending" id="lastResult">--</div>
          <div class="stat-meta" id="lastResultMeta"></div>
        </div>
        <div>
          <div class="stat-label">下次运行</div>
          <div class="stat-value pending" id="nextRun">--</div>
          <div class="stat-meta jd-num" id="nextRunMeta"></div>
        </div>
      </div>
      <div class="progress-strip" id="progressStrip"></div>
    </div>
  </div>

  <!-- Interval + run -->
  <div class="actions-wrap">
    <div class="interval">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" style="color: var(--text-muted)">
        <circle cx="8" cy="8" r="6.5"/>
        <path d="M8 4v4l2.5 1.5"/>
      </svg>
      <div class="interval-label">执行间隔</div>
      <select id="intervalSelect">
        <option value="0.5">每 30 分钟</option>
        <option value="1">每 1 小时</option>
        <option value="2" selected>每 2 小时</option>
        <option value="4">每 4 小时</option>
        <option value="6">每 6 小时</option>
        <option value="8">每 8 小时</option>
        <option value="12">每 12 小时</option>
        <option value="24">每 24 小时</option>
      </select>
    </div>
    <button class="btn-run" id="runBtn">
      <svg width="10" height="12" viewBox="0 0 10 12" fill="currentColor">
        <path d="M1 1.2v9.6c0 .7.77 1.12 1.36.74l7.5-4.8a.88.88 0 000-1.48L2.36.46A.88.88 0 001 1.2z"/>
      </svg>
      <span id="runBtnText">立即执行</span>
    </button>
  </div>

  <!-- Log -->
  <div class="log-wrap">
    <div class="log-head">
      <div class="section-label">运行日志</div>
      <div class="count">最近 200 条</div>
    </div>
    <div class="log-box" id="logBox">
      <div class="log-cursor"><span class="arrow">▸</span><span class="blink">_</span></div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">关闭窗口后将在菜单栏继续运行 · <span id="appVersion"></span></div>

  <script src="renderer.js"></script>
</body>
</html>
